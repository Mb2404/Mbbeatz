<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy License | MB Beats</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
  background:url("https://i.pinimg.com/originals/63/55/9d/63559de66e40a969a5618b74029bb0b7.gif") center/cover no-repeat;
  transform:scale(1.05);
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  background:rgba(0,0,0,0.6);
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

nav a{
  margin:0 10px;
  color:#aaa;
  text-decoration:none;
}

nav a:hover{
  color:white;
}

/* TITLE */
h1{
  text-align:center;
  margin-top:40px;
}

/* PLAYER */
.player{
  text-align:center;
  margin:20px;
}

audio{
  width:300px;
  max-width:90%;
}

/* LICENSE GRID */
.container{
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:20px;
  max-width:1000px;
  margin-left:auto;
  margin-right:auto;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  transition:0.3s;
  text-align:center;
}

.card:hover{
  transform:translateY(-5px);
  background:rgba(255,255,255,0.08);
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ff3c00;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
  transition:0.3s;
}

button:hover{
  background:#ff5a1f;
}

/* MOBILE */
@media (max-width: 900px){
  .container{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <nav>
    <a href="Home.html">Home</a>
    <a href="Beats.html">Beats</a>
    <a href="Contact.html">Contact</a>
  </nav>
</header>

<h1 id="beatName">Loading...</h1>

<!-- LICENSES -->
<div class="container">

  <div class="card">
    <h3>MP3 Lease</h3>
    <p>Basic use (streaming only)</p>
    <h2>$20</h2>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>WAV Lease</h3>
    <p>High quality + monetization</p>
    <h2>$40</h2>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Exclusive Rights</h3>
    <p>Full ownership of beat</p>
    <h2>$150</h2>
    <button>Buy Now</button>
  </div>

</div>

<script>
const beat = localStorage.getItem("beat");
const name = localStorage.getItem("name");

document.getElementById("beatName").innerText = name || "Beat";
document.getElementById("player").src = beat || "";
</script>

</body>
</html>
